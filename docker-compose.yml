services:
  api:
    build: .
    container_name: opc_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://opc_user:opc_password@db_test:5432/opc_test_db
    depends_on:
      db:
        condition: service_healthy
      db_test:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: opc_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://api:8000
    depends_on:
      - api
    command: sh -c "npm install && npm run dev"

  simulator:
    build: .
    container_name: opc_simulator
    ports:
      - "4840:4840"   # OPC-UA port, reachable from host for testing
    volumes:
      - .:/app
    command: python -m simulator
    restart: unless-stopped

  collector:
    build: .
    container_name: opc_collector
    env_file:
      - .env
    environment:
      OPCUA_URL: opc.tcp://simulator:4840
    depends_on:
      db:
        condition: service_healthy
      simulator:
        condition: service_started  # collector handles reconnection itself
    volumes:
      - .:/app
    command: python -m collector
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: opc_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_test:
    image: postgres:16-alpine
    container_name: opc_db_test
    environment:
      POSTGRES_USER: opc_user
      POSTGRES_PASSWORD: opc_password
      POSTGRES_DB: opc_test_db
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opc_user -d opc_test_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
